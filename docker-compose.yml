services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: telegram_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d telegram_bot" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      BOT_MODE: ${BOT_MODE:-webhook}
      PORT: 3000
      WEBHOOK_URL: ${WEBHOOK_URL}
      WEBHOOK_PATH: ${WEBHOOK_PATH:-/telegram/webhook}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/telegram_bot
      DATABASE_SSL: "false"
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      NEAR_MATCH_PERCENT: ${NEAR_MATCH_PERCENT:-10}

volumes:
  postgres_data:
